<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="620" fill="#ffffff"/>
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0B1D3A">Tac-Tic ERM — Architecture DevOps</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#6b7280">CI/CD pipeline + runtime conteneurisé</text>

  <!-- ===== CI/CD PIPELINE ===== -->
  <text x="40" y="96" font-size="14" font-weight="700" fill="#0EA5A0">PIPELINE CI/CD (GitHub Actions)</text>
  <g>
    <!-- dev -->
    <rect x="40" y="110" width="120" height="56" rx="8" fill="#0B1D3A"/>
    <text x="100" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">git push</text>
    <text x="100" y="153" text-anchor="middle" font-size="10" fill="#9fb3c8">Husky pre-commit</text>
    <!-- arrow -->
    <line x1="160" y1="138" x2="190" y2="138" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
    <!-- lint -->
    <rect x="190" y="110" width="110" height="56" rx="8" fill="#f0fdfa" stroke="#0EA5A0"/>
    <text x="245" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#0B1D3A">Lint</text>
    <text x="245" y="151" text-anchor="middle" font-size="10" fill="#6b7280">ESLint+Prettier</text>
    <line x1="300" y1="138" x2="330" y2="138" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
    <!-- test -->
    <rect x="330" y="110" width="110" height="56" rx="8" fill="#f0fdfa" stroke="#0EA5A0"/>
    <text x="385" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#0B1D3A">Test</text>
    <text x="385" y="151" text-anchor="middle" font-size="10" fill="#6b7280">Jest — 27 ✓</text>
    <line x1="440" y1="138" x2="470" y2="138" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
    <!-- build -->
    <rect x="470" y="110" width="110" height="56" rx="8" fill="#f0fdfa" stroke="#0EA5A0"/>
    <text x="525" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#0B1D3A">Build</text>
    <text x="525" y="151" text-anchor="middle" font-size="10" fill="#6b7280">Docker images</text>
    <line x1="580" y1="138" x2="610" y2="138" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
    <!-- scan -->
    <rect x="610" y="110" width="110" height="56" rx="8" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="665" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#0B1D3A">Scan</text>
    <text x="665" y="151" text-anchor="middle" font-size="10" fill="#6b7280">Trivy+Gitleaks</text>
    <line x1="720" y1="138" x2="750" y2="138" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
    <!-- deploy -->
    <rect x="750" y="110" width="110" height="56" rx="8" fill="#0EA5A0"/>
    <text x="805" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Deploy</text>
    <text x="805" y="151" text-anchor="middle" font-size="10" fill="#d1fae5">PM2 / edge</text>
  </g>

  <line x1="40" y1="195" x2="860" y2="195" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== RUNTIME ===== -->
  <text x="40" y="228" font-size="14" font-weight="700" fill="#0EA5A0">RUNTIME (Docker Compose — réseau tactic-net)</text>

  <!-- edge nginx -->
  <rect x="330" y="248" width="240" height="48" rx="8" fill="#0B1D3A"/>
  <text x="450" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Nginx — reverse proxy + SSL</text>
  <text x="450" y="287" text-anchor="middle" font-size="10" fill="#9fb3c8">/ → frontend   /api → backend   /ai → aimodule</text>

  <!-- arrows down to 3 services -->
  <line x1="390" y1="296" x2="180" y2="340" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
  <line x1="450" y1="296" x2="450" y2="340" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
  <line x1="510" y1="296" x2="720" y2="340" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>

  <!-- frontend -->
  <rect x="70" y="342" width="220" height="70" rx="8" fill="#ecfeff" stroke="#0EA5A0"/>
  <text x="180" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1D3A">Frontend</text>
  <text x="180" y="386" text-anchor="middle" font-size="10" fill="#6b7280">React 18 build → nginx:alpine</text>
  <text x="180" y="401" text-anchor="middle" font-size="10" fill="#6b7280">:80   (108 MB)</text>

  <!-- backend -->
  <rect x="340" y="342" width="220" height="70" rx="8" fill="#ecfeff" stroke="#0EA5A0"/>
  <text x="450" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1D3A">Backend</text>
  <text x="450" y="386" text-anchor="middle" font-size="10" fill="#6b7280">Node 20 / Express + Winston</text>
  <text x="450" y="401" text-anchor="middle" font-size="10" fill="#6b7280">:5000   /api/health   (2.0 GB)</text>

  <!-- aimodule -->
  <rect x="610" y="342" width="220" height="70" rx="8" fill="#f5f3ff" stroke="#7c3aed"/>
  <text x="720" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1D3A">AI Module</text>
  <text x="720" y="386" text-anchor="middle" font-size="10" fill="#6b7280">Python 3.11 / FastAPI + ML</text>
  <text x="720" y="401" text-anchor="middle" font-size="10" fill="#6b7280">:8001   (1.19 GB)</text>

  <!-- backend <-> mongo and backend <-> ai -->
  <line x1="450" y1="412" x2="450" y2="452" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
  <line x1="560" y1="377" x2="610" y2="377" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#a)"/>

  <!-- mongo -->
  <rect x="340" y="454" width="220" height="56" rx="8" fill="#f0fdf4" stroke="#10b981"/>
  <text x="450" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1D3A">MongoDB 7</text>
  <text x="450" y="496" text-anchor="middle" font-size="10" fill="#6b7280">volume persistant — :27017</text>

  <!-- observability band -->
  <rect x="70" y="536" width="760" height="48" rx="8" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="450" y="558" text-anchor="middle" font-size="12" font-weight="700" fill="#0B1D3A">Observabilité &amp; Sécurité</text>
  <text x="450" y="575" text-anchor="middle" font-size="10" fill="#6b7280">Winston JSON logs · /api/health · Helmet · CORS allowlist · rate-limit · Dependabot · secret redaction</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
