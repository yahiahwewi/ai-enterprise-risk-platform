<svg viewBox="0 0 820 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="820" height="460" fill="#ffffff"/>
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0B1D3A">Maturité DevOps — Avant vs Après</text>

  <!-- legend -->
  <rect x="300" y="52" width="14" height="14" fill="#ef4444"/><text x="320" y="64" font-size="11" fill="#374151">Avant</text>
  <rect x="400" y="52" width="14" height="14" fill="#0EA5A0"/><text x="420" y="64" font-size="11" fill="#374151">Après</text>

  <!-- axis -->
  <line x1="180" y1="90" x2="180" y2="400" stroke="#e5e7eb"/>
  <line x1="180" y1="400" x2="790" y2="400" stroke="#e5e7eb"/>

  <!-- rows: dimension | before% | after% -->
  <!-- each row y, label, before, after -->
  <!-- CI/CD -->
  <text x="172" y="112" text-anchor="end" font-size="11" fill="#374151">CI/CD</text>
  <rect x="180" y="104" width="0" height="12" fill="#ef4444"/>
  <rect x="180" y="118" width="540" height="12" fill="#0EA5A0"/><text x="726" y="128" font-size="10" fill="#0EA5A0">90%</text>
  <text x="726" y="114" font-size="10" fill="#ef4444">0%</text>

  <!-- Tests -->
  <text x="172" y="150" text-anchor="end" font-size="11" fill="#374151">Tests</text>
  <rect x="180" y="142" width="0" height="12" fill="#ef4444"/>
  <rect x="180" y="156" width="510" height="12" fill="#0EA5A0"/><text x="696" y="166" font-size="10" fill="#0EA5A0">85%</text>
  <text x="200" y="152" font-size="10" fill="#ef4444">0%</text>

  <!-- Containers -->
  <text x="172" y="188" text-anchor="end" font-size="11" fill="#374151">Conteneurs</text>
  <rect x="180" y="180" width="0" height="12" fill="#ef4444"/>
  <rect x="180" y="194" width="570" height="12" fill="#0EA5A0"/><text x="756" y="204" font-size="10" fill="#0EA5A0">95%</text>
  <text x="200" y="190" font-size="10" fill="#ef4444">0%</text>

  <!-- Code quality -->
  <text x="172" y="226" text-anchor="end" font-size="11" fill="#374151">Qualité code</text>
  <rect x="180" y="218" width="0" height="12" fill="#ef4444"/>
  <rect x="180" y="232" width="480" height="12" fill="#0EA5A0"/><text x="666" y="242" font-size="10" fill="#0EA5A0">80%</text>
  <text x="200" y="228" font-size="10" fill="#ef4444">0%</text>

  <!-- Logging -->
  <text x="172" y="264" text-anchor="end" font-size="11" fill="#374151">Logging</text>
  <rect x="180" y="256" width="48" height="12" fill="#ef4444"/><text x="234" y="266" font-size="10" fill="#ef4444">20%</text>
  <rect x="180" y="270" width="510" height="12" fill="#0EA5A0"/><text x="696" y="280" font-size="10" fill="#0EA5A0">85%</text>

  <!-- Monitoring -->
  <text x="172" y="302" text-anchor="end" font-size="11" fill="#374151">Monitoring</text>
  <rect x="180" y="294" width="30" height="12" fill="#ef4444"/><text x="216" y="304" font-size="10" fill="#ef4444">5%</text>
  <rect x="180" y="308" width="420" height="12" fill="#0EA5A0"/><text x="606" y="318" font-size="10" fill="#0EA5A0">70%</text>

  <!-- Secrets -->
  <text x="172" y="340" text-anchor="end" font-size="11" fill="#374151">Secrets</text>
  <rect x="180" y="332" width="45" height="12" fill="#ef4444"/><text x="231" y="342" font-size="10" fill="#ef4444">15%</text>
  <rect x="180" y="346" width="450" height="12" fill="#0EA5A0"/><text x="636" y="356" font-size="10" fill="#0EA5A0">75%</text>

  <!-- Deploy -->
  <text x="172" y="378" text-anchor="end" font-size="11" fill="#374151">Déploiement</text>
  <rect x="180" y="370" width="0" height="12" fill="#ef4444"/>
  <rect x="180" y="384" width="480" height="12" fill="#0EA5A0"/><text x="666" y="394" font-size="10" fill="#0EA5A0">80%</text>
  <text x="200" y="380" font-size="10" fill="#ef4444">0%</text>

  <!-- global score callout -->
  <rect x="180" y="416" width="610" height="30" rx="6" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="195" y="436" font-size="13" font-weight="700" fill="#ef4444">Global avant: ~15%</text>
  <text x="430" y="436" font-size="13" font-weight="700" fill="#0EA5A0">Global après: ~85% (production-ready)</text>
</svg>
