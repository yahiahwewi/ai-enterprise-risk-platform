global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # The Tac-Tic backend exposes Prometheus metrics at /metrics.
  # Scrapes the LIVE production backend on Azure App Service (HTTPS).
  - job_name: 'tactic-backend'
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ['tactic-backend-d1452d.azurewebsites.net:443']
    # For LOCAL development instead, comment the block above and use:
    # scheme: http
    # static_configs:
    #   - targets: ['backend:5000']

  # Prometheus scraping itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
