global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # The Tac-Tic backend exposes Prometheus metrics at /metrics
  - job_name: 'tactic-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:5000']

  # Prometheus scraping itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
