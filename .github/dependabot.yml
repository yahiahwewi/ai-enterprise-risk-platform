version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/backend'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'backend']

  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'frontend']

  - package-ecosystem: 'pip'
    directory: '/AiModule'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'ai-module']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'ci']

  - package-ecosystem: 'docker'
    directory: '/backend'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'docker']
