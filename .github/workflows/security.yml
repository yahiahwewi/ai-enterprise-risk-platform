name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday 06:00 UTC
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Dependency audit ───────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit backend
        run: cd backend && npm audit --audit-level=high || true
      - name: Audit frontend
        run: cd frontend && npm audit --audit-level=high || true

  # ── Container image vulnerability scan ─────────────────────
  trivy:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t tactic-backend:scan ./backend
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tactic-backend:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0' # report only; set to 1 to fail the build on findings

  # ── Secret scanning ────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
