name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & format check ────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root tooling
        run: npm install --no-audit --no-fund
      - name: Install backend deps
        run: cd backend && (npm ci --no-audit --no-fund || npm install --no-audit --no-fund)
      - name: Prettier check
        run: npm run format:check
      - name: ESLint backend
        run: npm run lint:backend

  # ── Backend tests ──────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        run: cd backend && (npm ci --no-audit --no-fund || npm install --no-audit --no-fund)
      - name: Run tests (with coverage thresholds)
        run: cd backend && npm run test:coverage
        env:
          MONGO_URI: mongodb://localhost:27017/erm_test
          JWT_SECRET: test_secret_ci
          NODE_ENV: test

  # ── Frontend build ─────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && (npm ci --no-audit --no-fund || npm install --no-audit --no-fund)
      - name: Build
        # CI=false: warnings don't fail the build. DISABLE_ESLINT_PLUGIN: the
        # bundle build is decoupled from lint (lint runs as its own concern).
        run: cd frontend && CI=false DISABLE_ESLINT_PLUGIN=true npm run build

  # ── AI module check ────────────────────────────────────────
  test-ai:
    name: AI Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: cd AiModule && pip install -r requirements.txt
      - name: Import smoke test
        run: cd AiModule && python -c "from app.main import app; print('FastAPI app imports OK')"

  # ── Docker build validation ────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t tactic-backend:ci ./backend
      - name: Build AI module image
        run: docker build -t tactic-aimodule:ci ./AiModule
      - name: Build frontend image
        run: docker build -t tactic-frontend:ci ./frontend
