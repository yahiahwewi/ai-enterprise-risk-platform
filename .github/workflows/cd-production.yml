name: CD — Production

# Builds + publishes images to GHCR and deploys the backend + AI module to
# Azure App Service (Web App for Containers). Triggered by pushes to `main`
# or version tags. The frontend is deployed automatically by Vercel.
#
# Enable the Azure deploy by setting repo variable AZURE_DEPLOY_ENABLED=true and
# the publish-profile secrets AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND and
# AZURE_WEBAPP_PUBLISH_PROFILE_AIMODULE (Azure portal → each Web App →
# "Get publish profile", or `az webapp deployment list-publishing-profiles --xml`).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { name: backend, context: ./backend }
          - { name: frontend, context: ./frontend }
          - { name: aimodule, context: ./AiModule }
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # docker-container driver enables type=gha cache
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase image name
        run: echo "IMAGE=${REGISTRY}/${OWNER,,}/tactic-${{ matrix.name }}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-azure:
    name: Deploy to Azure App Service
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Set image owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Deploy backend (Web App for Containers)
        uses: azure/webapps-deploy@v3
        with:
          app-name: tactic-backend-d1452d
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          images: ghcr.io/${{ env.OWNER }}/tactic-backend:${{ github.sha }}
      - name: Deploy AI module (Web App for Containers)
        uses: azure/webapps-deploy@v3
        with:
          app-name: tactic-aimodule-d1452d
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_AIMODULE }}
          images: ghcr.io/${{ env.OWNER }}/tactic-aimodule:${{ github.sha }}
      - name: Smoke test — wait for /api/health to report healthy
        run: |
          url="https://tactic-backend-d1452d.azurewebsites.net/api/health"
          for i in $(seq 1 24); do
            body=$(curl -s -m 10 "$url" || true)
            echo "attempt $i/24: $body"
            if echo "$body" | grep -q '"status":"healthy"'; then
              echo "✅ deployment healthy"; exit 0
            fi
            sleep 15
          done
          echo "❌ /api/health did not report healthy within ~6 min"; exit 1

  deploy-skipped-notice:
    name: Deploy (not configured)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_DEPLOY_ENABLED != 'true' }}
    steps:
      - run: |
          echo "Images pushed to GHCR with tags :latest and :${{ github.sha }}."
          echo "Azure deploy skipped — to enable automatic deployment:"
          echo "  1) Add secrets AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND and"
          echo "     AZURE_WEBAPP_PUBLISH_PROFILE_AIMODULE (each app's publish profile)."
          echo "  2) Set repo variable AZURE_DEPLOY_ENABLED=true."
          echo "Frontend deploys automatically via Vercel's GitHub integration."
