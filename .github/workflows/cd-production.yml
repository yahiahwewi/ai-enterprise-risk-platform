name: CD — Production

# Builds + publishes images to GHCR and deploys the backend + AI module to
# Azure Container Apps. Triggered by pushes to `main` or version tags.
# The frontend is deployed automatically by Vercel (no job needed here).
#
# Enable the Azure deploy by setting repo variable AZURE_DEPLOY_ENABLED=true and
# secret AZURE_CREDENTIALS (output of `az ad sp create-for-rbac --sdk-auth`).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { name: backend, context: ./backend }
          - { name: frontend, context: ./frontend }
          - { name: aimodule, context: ./AiModule }
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # docker-container driver enables type=gha cache
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase image name
        run: echo "IMAGE=${REGISTRY}/${OWNER,,}/tactic-${{ matrix.name }}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}
      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-azure:
    name: Deploy to Azure Container Apps
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Set image owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Update backend container app
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update -n tactic-backend -g tactic-rg \
              --image ghcr.io/${{ env.OWNER }}/tactic-backend:${{ github.sha }}
      - name: Update AI module container app
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update -n tactic-aimodule -g tactic-rg \
              --image ghcr.io/${{ env.OWNER }}/tactic-aimodule:${{ github.sha }}

  deploy-skipped-notice:
    name: Deploy (not configured)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_DEPLOY_ENABLED != 'true' }}
    steps:
      - run: |
          echo "Images pushed to GHCR with tags :latest and :${{ github.sha }}."
          echo "Azure deploy skipped — set repo variable AZURE_DEPLOY_ENABLED=true"
          echo "and secret AZURE_CREDENTIALS to enable automatic deployment."
          echo "Frontend deploys automatically via Vercel's GitHub integration."
