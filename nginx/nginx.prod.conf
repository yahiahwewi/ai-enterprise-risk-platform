# ── Production reverse proxy with SSL termination ───────────
# Place behind the host's Nginx (or use as the edge container).
# Obtain certs with: certbot certonly --webroot -w /var/www/certbot -d your-domain.com

# Rate limit zone (defense-in-depth alongside the app-level limiter)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name your-domain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com;

    # ── SSL ─────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M; # allow invoice/PDF uploads

    # ── Frontend (React static build) ───────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Backend API ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── AI module ───────────────────────────────────────────
    # No trailing slash: forward the full /ai/* URI, because the FastAPI
    # routers are mounted under prefix="/ai" (matches frontend/nginx.conf).
    location /ai/ {
        proxy_pass http://aimodule:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s; # ML inference can be slow
    }
}
